stages:
  - test

variables:
  PYTHON_VERSION: "3.11"

backend_unit_tests:
  stage: test
  allow_failure: false # prevents merging MR with tests failed
  image: python:${PYTHON_VERSION}
  before_script:
    - cd backend
    - pip install --upgrade pip
    - pip install -e ".[test]"
  script:
    - pytest tests/ -v --tb=short --cov=. --cov-report=term --cov-report=html:coverage_report --cov-report=xml
  artifacts:
    paths:
      - backend/coverage_report/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    when: always
  coverage: '/TOTAL.*\s+(\d+%)$/'
  only:
    - branches
    - merge_requests
